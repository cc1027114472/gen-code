name: desktop-full

on:
  workflow_dispatch:

jobs:
  full:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Install Playwright Python package
        run: python -m pip install playwright

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run desktop full acceptance
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\run-desktop-live-refresh-check.ps1

      - name: Upload full logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-full-logs
          if-no-files-found: ignore
          path: |
            server-full.stdout.log
            server-full.stderr.log
            desktop/frontend/vite-full.stdout.log
            desktop/frontend/vite-full.stderr.log

      - name: Upload full summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-full-summary
          if-no-files-found: ignore
          path: |
            tmp/desktop-smoke-artifacts/desktop-full-summary.json
            tmp/desktop-smoke-artifacts/desktop-full-failure.json

      - name: Upload full screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-full-screenshot
          if-no-files-found: ignore
          path: |
            tmp/desktop-smoke-artifacts/desktop-full-failure.png

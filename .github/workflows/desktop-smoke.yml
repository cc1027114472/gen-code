name: desktop-smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/desktop-smoke.yml"
      - "cmd/**"
      - "desktop/**"
      - "internal/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/desktop-smoke.yml"
      - "cmd/**"
      - "desktop/**"
      - "internal/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Install Playwright Python package
        run: python -m pip install playwright

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run desktop smoke acceptance
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\run-desktop-smoke-with-bootstrap.ps1

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-logs
          if-no-files-found: ignore
          path: |
            server-smoke.stdout.log
            server-smoke.stderr.log
            desktop/frontend/vite-smoke.stdout.log
            desktop/frontend/vite-smoke.stderr.log

      - name: Upload smoke summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-summary
          if-no-files-found: ignore
          path: |
            tmp/desktop-smoke-artifacts/desktop-smoke-summary.json
            tmp/desktop-smoke-artifacts/desktop-full-summary.json
            tmp/desktop-smoke-artifacts/desktop-smoke-failure.json

      - name: Upload smoke screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-screenshot
          if-no-files-found: ignore
          path: |
            tmp/desktop-smoke-artifacts/desktop-smoke-failure.png
